let active=localStorage.activeCert||certs[0].id,tab=localStorage.activeTab||'overview',flash=0,flipped=false,quiz=0,exam=null,examTimer=null,state=load();
function load(){try{return JSON.parse(localStorage.wguStudyState||'{}')}catch{return {}}}function save(){localStorage.wguStudyState=JSON.stringify(state);localStorage.lastSave=new Date().toISOString()}function c(){return certs.find(x=>x.id===active)||certs[0]}function key(name){return active+':'+name}function pct(n,d){return d?Math.round(n/d*100):0}function scores(){return state[key('scores')]||[]}function confidence(){let s=scores().slice(-3);if(!s.length)return '—';return Math.min(100,Math.round((s.reduce((a,b)=>a+b,0)/s.length)*.85+Math.min(scores().length,5)*3))+'%'}function completion(x=c()){let labs=(state[x.id+':labs']||[]).length/(x.labs.length||1)*30,sc=((state[x.id+':scores']||[]).reduce((a,b)=>a+b,0)/((state[x.id+':scores']||[]).length||1))*0.45,pb=(state[x.id+':pbqScore']||0)/(x.pbqs.length||1)*15,exam=((state[x.id+':examScores']||[]).slice(-1)[0]||0)*0.1;return Math.min(100,Math.round(labs+sc+pb+exam))}
function render(){renderNav();renderHead();renderTabs();renderContent()}function renderNav(){let q=(document.getElementById('search').value||'').toLowerCase();nav.innerHTML=certs.filter(x=>(x.title+x.vendor+x.exam+x.desc+x.focus.join(' ')).toLowerCase().includes(q)).map(x=>`<button class="cert ${x.id===active?'active':''}" onclick="active='${x.id}';localStorage.activeCert=active;quiz=0;flash=0;flipped=false;exam=null;clearInterval(examTimer);render()"><div><strong>${x.title}</strong><span>${x.vendor} · ${x.exam}</span></div><span class="pill">${completion(x)}%</span></button>`).join('')}function renderHead(){let x=c();kicker.textContent=x.vendor+' · '+x.exam;title.textContent=x.title;desc.textContent=x.desc;progress.textContent=completion(x)+'%';score.textContent=scores().length?scores().at(-1)+'%':'—';confidence.textContent=confidence()}function renderTabs(){let arr=[['overview','Overview'],['practice','Practice'],['exam','Timed exam'],['weak','Weak areas'],['flash','Flashcards'],['labs','Labs'],['pbq','PBQ / Sims'],['sources','Sources']];tabs.innerHTML=arr.map(t=>`<button class="tab ${tab===t[0]?'active':''}" onclick="setTab('${t[0]}')">${t[1]}</button>`).join('')}function setTab(t){tab=t;localStorage.activeTab=t;render()}function renderContent(){let x=c();content.innerHTML={overview:overview(x),practice:practice(x),exam:examView(x),weak:weakView(x),flash:flashcards(x),labs:labs(x),pbq:pbq(x),sources:sourcesPanel(x)}[tab]}
function overview(x){return `<div class="grid two"><div class="glass card"><h3>Domains</h3>${x.domains.map(d=>`<p class="muted"><strong>${d[0]}</strong> <span style="float:right">${d[1]}%</span></p><div class="bar"><div class="fill" style="width:${d[1]}%"></div></div>`).join('')}</div><div class="glass card"><h3>Study focus</h3><ul class="list">${x.focus.map(f=>`<li>${f}</li>`).join('')}</ul><div class="explain"><strong>Objective mapping status:</strong> Each question now has a starter objective label, but these still need official source verification before calling this exam-ready.</div></div></div>`}
function practice(x){let q=x.questions[quiz%x.questions.length];return `<div class="glass card"><h3>Practice question ${quiz+1} / ${x.questions.length}</h3><span class="tag">${q[4]||'Objective pending'}</span><p>${q[0]}</p>${q[2].map(o=>`<button class="option" onclick="answer('${safe(o)}')">${o}</button>`).join('')}<div id="ex"></div></div><div class="actions"><button class="btn" onclick="quiz=(quiz-1+${x.questions.length})%${x.questions.length};render()">Previous</button><button class="btn primary" onclick="quiz=(quiz+1)%${x.questions.length};render()">Next</button><button class="btn" onclick="grade()">Grade answered set</button></div>`}function safe(s){return String(s).replace(/'/g,'&#39;')}function answer(o){o=o.replace(/&#39;/g,"'");let x=c(),q=x.questions[quiz%x.questions.length],ok=o===q[1],a=state[key('answers')]||{};a[quiz]=ok;state[key('answers')]=a;let w=state[key('weak')]||{};let obj=q[4]||'Objective pending';w[obj]=w[obj]||{right:0,wrong:0};ok?w[obj].right++:w[obj].wrong++;state[key('weak')]=w;save();document.querySelectorAll('.option').forEach(b=>{if(b.textContent===q[1])b.classList.add('correct');if(b.textContent===o&&!ok)b.classList.add('wrong');b.disabled=true});ex.innerHTML=`<div class="explain"><strong>${ok?'Correct.':'Not quite.'}</strong> ${q[3]}</div>`}function grade(){let x=c(),a=state[key('answers')]||{},score=pct(Object.values(a).filter(Boolean).length,x.questions.length),s=scores();s.push(score);state[key('scores')]=s;state[key('answers')]={};save();alert('Saved score: '+score+'%');render()}
function startExam(){let qs=[...c().questions].sort(()=>Math.random()-.5).slice(0,Math.min(10,c().questions.length));exam={qs,answers:{},start:Date.now(),end:Date.now()+10*60*1000};clearInterval(examTimer);examTimer=setInterval(()=>{if(tab==='exam')renderContent();if(exam&&Date.now()>exam.end){finishExam()}},1000);render()}function examView(x){if(!exam)return `<div class="glass card"><h3>Timed readiness check</h3><p class="muted">This creates a 10-minute mixed quiz from the selected certification and saves a readiness score. It is not a real exam simulator yet, but it builds pressure and recall.</p><button class="btn primary" onclick="startExam()">Start 10-minute exam check</button></div>`;let left=Math.max(0,Math.floor((exam.end-Date.now())/1000)),m=Math.floor(left/60),s=String(left%60).padStart(2,'0');return `<div class="glass card"><h3>Timed exam check</h3><div class="timer ${left<60?'danger':''}">${m}:${s}</div>${exam.qs.map((q,i)=>`<div class="explain"><span class="tag">${q[4]}</span><p><strong>${i+1}. ${q[0]}</strong></p>${q[2].map(o=>`<label class="option"><input type="radio" name="eq${i}" value="${o}" ${exam.answers[i]===o?'checked':''} onchange="exam.answers[${i}]=this.value"> ${o}</label>`).join('')}</div>`).join('')}<div class="actions"><button class="btn primary" onclick="finishExam()">Finish and score</button></div></div>`}function finishExam(){if(!exam)return;let right=exam.qs.filter((q,i)=>exam.answers[i]===q[1]).length,score=pct(right,exam.qs.length);let s=state[key('examScores')]||[];s.push(score);state[key('examScores')]=s;exam.qs.forEach((q,i)=>{let ok=exam.answers[i]===q[1],w=state[key('weak')]||{},obj=q[4]||'Objective pending';w[obj]=w[obj]||{right:0,wrong:0};ok?w[obj].right++:w[obj].wrong++;state[key('weak')]=w});save();clearInterval(examTimer);exam=null;alert('Timed exam score: '+score+'%');render()}
function weakView(){let w=state[key('weak')]||{},rows=Object.entries(w).map(([name,v])=>[name,v,pct(v.right,v.right+v.wrong)]).sort((a,b)=>a[2]-b[2]);return `<div class="glass card"><h3>Weak-area tracker</h3><p class="muted">This updates as you answer practice and timed exam questions. Low scores show where to drill next.</p>${rows.length?`<ul class="list">${rows.map(r=>`<li><strong>${r[0]}</strong><br>${r[2]}% correct · ${r[1].right} right / ${r[1].wrong} wrong</li>`).join('')}</ul>`:'<p class="muted">No data yet. Answer practice questions or run a timed exam.</p>'}</div>`}
function flashcards(x){let card=x.cards[flash%x.cards.length];return `<div class="glass card flash" onclick="flipped=!flipped;render()"><div>${flipped?`<div class="def">${card[1]}</div>`:`<div class="term">${card[0]}</div><p class="muted">Click to flip</p>`}</div></div><div class="actions"><button class="btn" onclick="flash=(flash-1+${x.cards.length})%${x.cards.length};flipped=false;render()">Previous</button><button class="btn primary" onclick="flash=(flash+1)%${x.cards.length};flipped=false;render()">Next</button></div>`}
function labs(x){let done=state[key('labs')]||[];return `<div class="grid two">${x.labs.map((l,i)=>`<div class="glass card"><h3>${l[0]}</h3><span class="tag">${l[1]} · ${l[2]}</span><ul class="list" style="margin-top:12px">${l[3].map(s=>`<li>${s}</li>`).join('')}</ul><p class="muted"><strong>Deliverable:</strong> ${l[4]}</p><label class="check"><input type="checkbox" ${done.includes(i)?'checked':''} onchange="toggleLab(${i},this.checked)"><span>Mark complete</span></label></div>`).join('')}</div>`}function toggleLab(i,on){let a=state[key('labs')]||[];if(on&&!a.includes(i))a.push(i);if(!on)a=a.filter(x=>x!==i);state[key('labs')]=a;save();render()}
function pbq(x){if(!x.pbqs.length)return '<div class="glass card"><h3>No PBQ module here yet</h3><p class="muted">Use the labs tab for hands-on confidence for this certification.</p></div>';return `<div class="grid">${x.pbqs.map((p,i)=>`<div class="glass card"><h3>${p[0]}</h3><p class="muted">${p[1]}</p>${p[2].map(o=>`<label class="option"><input type="checkbox" data-pbq="${i}" value="${o}"> ${o}</label>`).join('')}<div class="actions"><button class="btn primary" onclick="checkPbq(${i})">Check simulation</button><span id="pbq${i}" class="pill">Not checked</span></div><div id="pbqe${i}" class="explain hide">${p[4]}</div></div>`).join('')}</div><div class="actions"><button class="btn" onclick="savePbq()">Save PBQ score</button></div>`}function checkPbq(i){let p=c().pbqs[i],picked=[...document.querySelectorAll(`input[data-pbq="${i}"]:checked`)].map(x=>x.value).sort(),ans=[...p[3]].sort(),ok=picked.length===ans.length&&picked.every((v,j)=>v===ans[j]);document.getElementById('pbq'+i).textContent=ok?'Correct':'Review';document.getElementById('pbq'+i).style.color=ok?'var(--good)':'var(--warn)';document.getElementById('pbqe'+i).classList.remove('hide');let checks=state[key('pbqChecks')]||{};checks[i]=ok;state[key('pbqChecks')]=checks;save()}function savePbq(){let checks=state[key('pbqChecks')]||{},score=Object.values(checks).filter(Boolean).length;state[key('pbqScore')]=score;save();alert('Saved PBQ score: '+score+'/'+c().pbqs.length);render()}
function sourcesPanel(){return `<div class="grid two"><div class="glass card"><h3>Disclaimers</h3><p class="muted">Original educational study tool. Not affiliated with WGU, CompTIA, AWS, LPI, or PeopleCert. No exam dumps, real exam questions, or protected exam content. Verify against official objectives before serious exam prep.</p><button class="btn primary" onclick="exportProgress()">Export progress as JSON</button></div><div class="glass card"><h3>What changed in this version</h3><ul class="list"><li><strong>A+ restored:</strong> Core 1 and Core 2 are now separate study sections.</li><li><strong>Timed exam mode:</strong> 10-minute pressure check added.</li><li><strong>Weak-area tracking:</strong> Objective tags now track right/wrong patterns.</li><li><strong>More complete path:</strong> A+, Network+, Security+, Cloud+, AWS, Linux, and ITIL are all visible.</li></ul></div></div>`}function exportProgress(){let blob=new Blob([JSON.stringify({active,exported:new Date().toISOString(),state},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='wgu-study-progress.json';a.click();URL.revokeObjectURL(url)}function resetProgress(){if(confirm('Clear saved progress in this browser?')){state={};save();render()}}
search.addEventListener('input',renderNav);render();
