function load(){try{return JSON.parse(localStorage.wguStudyState||'{}')}catch{return {}}}function save(){localStorage.wguStudyState=JSON.stringify(state);localStorage.lastSave=new Date().toISOString()}function c(){return certs.find(x=>x.id===active)||certs[0]}function key(n,id=active){return id+':'+n}function arr(n,id=active){return state[key(n,id)]||[]}function pct(n,d){return d?Math.round(n/d*100):0}function now(){return Date.now()}function dueCards(id=active){let x=certs.find(z=>z.id===id)||c(),s=state[key('srs',id)]||{};return x.cards.filter((card,i)=>(s[i]?.due||0)<=now())}function readiness(x=c()){let sc=arr('scores',x.id),ex=arr('examScores',x.id),labs=arr('labs',x.id).length/(x.labs.length||1)*20,srs=(x.cards.length-dueCards(x.id).length)/(x.cards.length||1)*25,quiz=(sc.reduce((a,b)=>a+b,0)/(sc.length||1))*0.3,timed=((ex.at(-1)||0))*0.25;return Math.min(100,Math.round(labs+srs+quiz+timed))}
function confidence(){let vals=arr('scores').slice(-3).concat(arr('examScores').slice(-2));if(!vals.length)return '—';return Math.min(100,Math.round(vals.reduce((a,b)=>a+b,0)/vals.length))+'%'}
function render(){renderNav();renderHead();renderTabs();renderContent()}function renderNav(){let q=(search.value||'').toLowerCase();nav.innerHTML=certs.filter(x=>(x.title+x.vendor+x.exam+x.desc).toLowerCase().includes(q)).map(x=>`<button class="cert ${x.id===active?'active':''}" onclick="active='${x.id}';localStorage.activeCert=active;tab='plan';localStorage.activeTab=tab;quiz=0;flash=0;flipped=false;exam=null;clearInterval(examTimer);render()"><div><strong>${x.title}</strong><span>${x.vendor} · ${x.exam}</span></div><span class="pill">${readiness(x)}%</span></button>`).join('')}function renderHead(){let x=c();kicker.textContent=x.vendor+' · '+x.exam;title.textContent=x.title;desc.textContent=x.desc;progress.textContent=readiness(x)+'%';due.textContent=dueCards().length;confidence.textContent=confidence()}function renderTabs(){let t=[['plan','Plan'],['practice','Practice'],['srs','SRS'],['exam','Timed exam'],['weak','Weak areas'],['labs','Labs'],['pbq','PBQ'],['sources','Sources']];tabs.innerHTML=t.map(a=>`<button class="tab ${tab===a[0]?'active':''}" onclick="setTab('${a[0]}')">${a[1]}</button>`).join('')}function setTab(t){tab=t;localStorage.activeTab=t;render()}function renderContent(){content.innerHTML={plan:plan,practice:practice,srs:srs,exam:examView,weak:weak,labs:labs,pbq:pbq,sources:sourcesView}[tab]()}
function plan(){let x=c(),w=getWeak().slice(0,3);return `<div class="grid two"><div class="glass card"><h3>Today’s study plan</h3><ul class="list"><li><strong>1. Clear due cards:</strong> ${dueCards().length} spaced-repetition card(s) due.</li><li><strong>2. Practice:</strong> answer all objective-tagged questions for this cert.</li><li><strong>3. Lab:</strong> complete one lab deliverable, not just reading.</li><li><strong>4. Timed check:</strong> finish one 10-minute readiness exam.</li></ul><div class="actions"><button class="btn primary" onclick="setTab('srs')">Start due cards</button><button class="btn" onclick="setTab('practice')">Practice questions</button></div></div><div class="glass card"><h3>Readiness formula</h3><p class="muted">Readiness combines lab completion, spaced-repetition card health, practice scores, and timed-exam scores.</p><ul class="list">${w.length?w.map(r=>`<li><strong>${r[0]}</strong><br>${r[2]}% correct — drill this next.</li>`).join(''):'<li>Weak-area tracking starts after you answer questions.</li>'}</ul></div></div>`}
function qObj(i){return c().questions[i%c().questions.length]}function practice(){let q=qObj(quiz);return `<div class="glass card"><h3>Practice question ${quiz+1} / ${c().questions.length}</h3><span class="tag">${q[4]}</span><p>${q[0]}</p>${q[2].map(o=>`<button class="option" onclick="answer('${safe(o)}')">${o}</button>`).join('')}<div id="ex"></div></div><div class="actions"><button class="btn" onclick="quiz=(quiz-1+${c().questions.length})%${c().questions.length};render()">Previous</button><button class="btn primary" onclick="quiz=(quiz+1)%${c().questions.length};render()">Next</button><button class="btn" onclick="gradePractice()">Save practice score</button></div>`}function safe(s){return String(s).replace(/'/g,'&#39;')}function answer(o){o=o.replace(/&#39;/g,"'");let q=qObj(quiz),ok=o===q[1],a=state[key('answers')]||{};a[quiz]=ok;state[key('answers')]=a;trackWeak(q[4],ok);save();document.querySelectorAll('.option').forEach(b=>{if(b.textContent===q[1])b.classList.add('correct');if(b.textContent===o&&!ok)b.classList.add('wrong');b.disabled=true});ex.innerHTML=`<div class="explain"><strong>${ok?'Correct.':'Not quite.'}</strong> ${q[3]}</div>`}function gradePractice(){let a=state[key('answers')]||{},score=pct(Object.values(a).filter(Boolean).length,c().questions.length),s=arr('scores');s.push(score);state[key('scores')]=s;state[key('answers')]={};save();alert('Saved score: '+score+'%');render()}
function srs(){let x=c(),st=state[key('srs')]||{},due=dueCards();let idx=due.length?x.cards.indexOf(due[0]):flash%x.cards.length,card=x.cards[idx],r=st[idx]||{box:0,due:0,seen:0};return `<div class="glass card flash" onclick="flipped=!flipped;renderContent()"><div>${flipped?`<div class="def">${card[1]}</div><p class="muted">${card[2]} · Box ${r.box||0} · Seen ${r.seen||0}</p>`:`<div class="term">${card[0]}</div><p class="muted">${due.length?'Due now':'No cards due — preview mode'} · click to flip</p>`}</div></div><div class="actions"><button class="btn" onclick="rateCard(${idx},0)">Again</button><button class="btn" onclick="rateCard(${idx},1)">Hard</button><button class="btn primary" onclick="rateCard(${idx},2)">Good</button><button class="btn" onclick="rateCard(${idx},3)">Easy</button><button class="btn" onclick="flash=(flash+1)%${x.cards.length};flipped=false;render()">Browse next</button></div><div class="explain"><strong>Spaced repetition is active.</strong> Again = due soon, Hard = tomorrow, Good = several days, Easy = longer interval. Due cards affect readiness.</div>`}function rateCard(i,rating){let st=state[key('srs')]||{},old=st[i]||{box:0,seen:0},days=rating===0?0.02:rating===1?1:rating===2?Math.max(2,(old.box||0)+2):Math.max(4,(old.box||0)*2+4);st[i]={box:rating===0?0:Math.min(8,(old.box||0)+rating),seen:(old.seen||0)+1,last:now(),due:now()+days*86400000};state[key('srs')]=st;flipped=false;save();render()}
function startExam(){let qs=[...c().questions].sort(()=>Math.random()-.5).slice(0,Math.min(10,c().questions.length));exam={qs,answers:{},end:now()+10*60*1000};clearInterval(examTimer);examTimer=setInterval(()=>{if(tab==='exam')renderContent();if(exam&&now()>exam.end)finishExam()},1000);render()}function examView(){if(!exam)return `<div class="glass card"><h3>Timed readiness check</h3><p class="muted">10-minute mixed quiz from this certification. Scores feed readiness and weak-area tracking.</p><button class="btn primary" onclick="startExam()">Start 10-minute check</button></div>`;let left=Math.max(0,Math.floor((exam.end-now())/1000)),m=Math.floor(left/60),ss=String(left%60).padStart(2,'0');return `<div class="glass card"><h3>Timed exam check</h3><div class="timer ${left<60?'danger':''}">${m}:${ss}</div>${exam.qs.map((q,i)=>`<div class="explain"><span class="tag">${q[4]}</span><p><strong>${i+1}. ${q[0]}</strong></p>${q[2].map(o=>`<label class="option"><input type="radio" name="eq${i}" value="${o}" ${exam.answers[i]===o?'checked':''} onchange="exam.answers[${i}]=this.value"> ${o}</label>`).join('')}</div>`).join('')}<button class="btn primary" onclick="finishExam()">Finish and score</button></div>`}function finishExam(){if(!exam)return;let right=exam.qs.filter((q,i)=>exam.answers[i]===q[1]).length,score=pct(right,exam.qs.length),s=arr('examScores');s.push(score);state[key('examScores')]=s;exam.qs.forEach((q,i)=>trackWeak(q[4],exam.answers[i]===q[1]));exam=null;clearInterval(examTimer);save();alert('Timed score: '+score+'%');render()}
function trackWeak(obj,ok){let w=state[key('weak')]||{};w[obj]=w[obj]||{right:0,wrong:0};ok?w[obj].right++:w[obj].wrong++;state[key('weak')]=w}function getWeak(){let w=state[key('weak')]||{};return Object.entries(w).map(([n,v])=>[n,v,pct(v.right,v.right+v.wrong)]).sort((a,b)=>a[2]-b[2])}function weak(){let rows=getWeak();return `<div class="glass card"><h3>Weak-area tracker</h3><p class="muted">Objective tags collect right/wrong history from practice and timed exams.</p>${rows.length?`<ul class="list">${rows.map(r=>`<li><strong>${r[0]}</strong><br>${r[2]}% correct · ${r[1].right} right / ${r[1].wrong} wrong</li>`).join('')}</ul>`:'<p class="muted">Answer questions to generate weak-area data.</p>'}</div>`}
function labs(){let done=arr('labs');return `<div class="grid two">${c().labs.map((l,i)=>`<div class="glass card"><h3>${l[0]}</h3><p class="muted">${l[1]}</p><label><input type="checkbox" ${done.includes(i)?'checked':''} onchange="toggleLab(${i},this.checked)"> Mark deliverable complete</label></div>`).join('')}</div>`}function toggleLab(i,on){let d=arr('labs');if(on&&!d.includes(i))d.push(i);if(!on)d=d.filter(x=>x!==i);state[key('labs')]=d;save();render()}
function pbq(){if(!c().pbqs.length)return '<div class="glass card"><h3>No PBQ yet</h3><p class="muted">Use labs and timed checks for this section.</p></div>';return `<div class="grid">${c().pbqs.map((p,i)=>`<div class="glass card"><h3>${p[0]}</h3>${p[1].map(o=>`<label class="option"><input type="checkbox" data-pbq="${i}" value="${o}"> ${o}</label>`).join('')}<button class="btn primary" onclick="checkPbq(${i})">Check</button><div id="pbq${i}" class="explain"></div></div>`).join('')}</div>`}function checkPbq(i){let p=c().pbqs[i],picked=[...document.querySelectorAll(`input[data-pbq="${i}"]:checked`)].map(x=>x.value).sort(),ans=[...p[2]].sort(),ok=picked.length===ans.length&&picked.every((v,j)=>v===ans[j]);document.getElementById('pbq'+i).innerHTML=ok?'<span class="good">Correct.</span>':'Review the controls and try again.'}
function sourcesView(){return `<div class="grid two"><div class="glass card"><h3>Official source bank</h3><ul class="list">${sources.map(s=>`<li><a href="${s[1]}" target="_blank" rel="noreferrer">${s[0]}</a></li>`).join('')}</ul></div><div class="glass card"><h3>Export / status</h3><p class="muted">This version includes spaced repetition, objective tags, labs, timed checks, weak-area tracking, and official source links. It is much closer to a real study command center, but questions still need deeper vendor-objective expansion.</p><button class="btn primary" onclick="exportProgress()">Export progress JSON</button></div></div>`}function exportProgress(){let blob=new Blob([JSON.stringify({active,exported:new Date().toISOString(),state},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='wgu-study-progress.json';a.click();URL.revokeObjectURL(url)}function resetProgress(){if(confirm('Clear all local progress?')){state={};save();render()}}
search.addEventListener('input',renderNav);render();
</script>
