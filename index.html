<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WGU AWS Study Command Center</title>
  <meta name="description" content="Static study dashboard for WGU Cloud and Network Engineering AWS certification prep." />
  <style>
    :root{--bg:#070b13;--panel:#111827d9;--panel2:#ffffff0d;--line:#ffffff1f;--text:#eef6ff;--muted:#9fb0c7;--a:#72d6ff;--b:#9dffbe;--warn:#ffd166;--bad:#ff6b6b;--good:#36d399;--r:22px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% -10%,#50b4ff52,transparent 32%),radial-gradient(circle at 85% 0,#7effa833,transparent 28%),linear-gradient(135deg,#070b13,#0b1424 45%,#111827);color:var(--text);min-height:100vh}button,input{font:inherit}.app{display:grid;grid-template-columns:320px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;padding:24px;background:#060b14bf;border-right:1px solid var(--line);backdrop-filter:blur(18px)}.brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}.logo{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;color:#07111f;font-weight:900;background:linear-gradient(135deg,var(--a),var(--b));box-shadow:0 0 34px #72d6ff44}.brand h1{font-size:18px;margin:0;line-height:1.05}.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}.search{width:100%;border:1px solid var(--line);background:#ffffff0d;color:var(--text);border-radius:14px;padding:12px 14px;outline:none}.label{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:11px;margin:20px 0 10px}.cert{width:100%;text-align:left;border:1px solid transparent;background:transparent;color:var(--text);border-radius:16px;padding:13px 14px;margin-bottom:8px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:8px}.cert:hover{background:#ffffff0d;border-color:var(--line)}.cert.active{background:linear-gradient(135deg,#72d6ff29,#9dffbe14);border-color:#72d6ff66}.cert strong{display:block;font-size:13px}.cert span{display:block;color:var(--muted);font-size:12px;margin-top:3px}.pill{font-size:11px;color:var(--muted);border:1px solid var(--line);background:#ffffff0d;border-radius:999px;padding:4px 8px;white-space:nowrap}.main{padding:30px;max-width:1260px;width:100%;margin:0 auto}.hero{display:grid;grid-template-columns:1.45fr .8fr;gap:18px;margin-bottom:18px}.glass{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 18px 70px #0006;backdrop-filter:blur(20px)}.card{padding:22px}.heroCard{padding:28px;position:relative;overflow:hidden}.heroCard:after{content:"";position:absolute;right:-140px;top:-150px;width:320px;height:320px;border-radius:999px;background:radial-gradient(circle,#72d6ff38,transparent 68%)}.kicker{color:var(--b);font-size:12px;text-transform:uppercase;letter-spacing:.13em;font-weight:900}h2{font-size:clamp(30px,4vw,56px);line-height:.96;letter-spacing:-.07em;margin:10px 0}h3{margin:0 0 12px}.muted{color:var(--muted);line-height:1.6}.actions,.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn,.tab{border:1px solid var(--line);background:#ffffff12;color:var(--text);border-radius:14px;padding:11px 14px;cursor:pointer;text-decoration:none}.btn:hover,.tab:hover{background:#ffffff1c}.primary{background:linear-gradient(135deg,var(--a),var(--b));color:#07111f;border:0;font-weight:900}.tab.active{background:linear-gradient(135deg,var(--a),var(--b));color:#07111f;border:0;font-weight:900}.stats{display:grid;gap:12px;padding:20px}.stat{background:#ffffff0d;border:1px solid var(--line);border-radius:18px;padding:16px}.stat b{display:block;font-size:28px}.grid{display:grid;gap:18px}.two{grid-template-columns:1fr 1fr}.three{grid-template-columns:repeat(3,1fr)}.bar{height:9px;background:#ffffff12;border:1px solid var(--line);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--a),var(--b))}.list{display:grid;gap:10px;padding:0;margin:0;list-style:none}.list li{padding:12px;border:1px solid var(--line);background:#ffffff0b;border-radius:16px;color:var(--muted);line-height:1.5}.list strong{color:var(--text)}.option{display:block;width:100%;text-align:left;margin:8px 0;padding:13px 14px;border:1px solid var(--line);border-radius:14px;background:#ffffff0d;color:var(--text);cursor:pointer}.correct{border-color:#36d399cc!important;background:#36d39924!important}.wrong{border-color:#ff6b6bcc!important;background:#ff6b6b21!important}.flash{min-height:230px;display:grid;place-items:center;text-align:center;cursor:pointer}.flash .term{font-size:clamp(26px,4vw,44px);font-weight:900;letter-spacing:-.04em}.flash .def{font-size:20px;line-height:1.5;max-width:760px}.explain{margin-top:14px;padding:14px;border:1px solid var(--line);border-radius:14px;background:#ffffff0b;color:var(--muted);line-height:1.55}.check{display:flex;gap:10px;align-items:flex-start}.check input{margin-top:4px;accent-color:#72d6ff}.tag{background:var(--warn);color:#07111f;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:900}.small{font-size:13px}.hide{display:none!important}code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}a{color:var(--a)}@media(max-width:1000px){.app{grid-template-columns:1fr}.side{height:auto;position:relative}.hero,.two,.three{grid-template-columns:1fr}.main{padding:18px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="brand"><div class="logo">JW</div><div><h1>WGU AWS Study App</h1><p>Cloud + Network Engineering Command Center</p></div></div>
    <input id="search" class="search" placeholder="Search certs, domains, labs..." />
    <div class="label">Certifications</div><div id="nav"></div>
    <div class="label">Controls</div>
    <button class="cert" onclick="resetProgress()"><strong>Reset local progress</strong><span>Clears browser-only progress.</span></button>
    <p class="muted small">Progress saves to this browser with localStorage. No backend, account, or cloud sync yet.</p>
  </aside>
  <main class="main">
    <section class="hero">
      <div class="glass heroCard"><div class="kicker" id="kicker">Selected path</div><h2 id="title"></h2><p id="desc" class="muted"></p><div class="actions"><button class="btn primary" onclick="setTab('practice')">Start practice</button><button class="btn" onclick="setTab('labs')">Quick labs</button><button class="btn" onclick="setTab('flash')">Flashcards</button><button class="btn" onclick="setTab('pbq')">PBQ / simulations</button></div></div>
      <div class="glass stats"><div class="stat"><b id="progress">0%</b><span class="muted">Completion</span></div><div class="stat"><b id="score">—</b><span class="muted">Last practice score</span></div><div class="stat"><b id="confidence">—</b><span class="muted">Confidence</span></div></div>
    </section>
    <div class="tabs" id="tabs"></div><section id="content"></section>
  </main>
</div>
<script>
const certs=[
{id:'cloud-plus',vendor:'CompTIA',title:'Cloud+ Gap Module',exam:'CV0-004',desc:'Cloud deployment, operations, troubleshooting, security, DevOps basics, and high-availability thinking. Added because Cloud+ was the main missing coverage gap.',domains:[['Cloud architecture',24],['Deployment',22],['Operations',18],['Security',20],['Troubleshooting',16]],focus:['Know shared responsibility across IaaS, PaaS, and SaaS.','Practice scaling, availability, backup, and recovery scenarios.','Use labs to connect concepts to real cloud administration work.'],cards:[['Elasticity','Ability to dynamically add or remove resources as demand changes.'],['High availability','Designing systems to remain usable during component failure.'],['RPO / RTO','Recovery point objective is acceptable data loss; recovery time objective is acceptable outage time.'],['IaC','Infrastructure as code: repeatable infrastructure defined in files.']],questions:[['Which design improves availability across a region?','Deploy resources across multiple availability zones',['Use one VM only','Deploy resources across multiple availability zones','Disable monitoring','Store backups on the same disk'],'Multiple AZs reduce the impact of a single datacenter failure.'],['What does RTO define?','How quickly service must be restored',['How old backups can be','How quickly service must be restored','How many CPUs are assigned','How much bandwidth is used'],'RTO is the recovery time objective.'],['What is a common IaC benefit?','Repeatable deployments',['Manual configuration only','Repeatable deployments','More licensing fees','No change control'],'IaC makes environments easier to reproduce and audit.']],labs:[['Build a cloud DR matrix','25 min','exam',['Define one workload.','Pick backup frequency, RPO, and RTO.','Choose restore test steps.'],'A short DR table with RPO/RTO and restore validation.'],['Cloud cost cleanup drill','20 min','real-world',['List unused resources.','Label what should be stopped, resized, or deleted.','Define an approval step.'],'A cleanup checklist with risk notes.']],pbqs:[['Select HA controls','Choose all controls that improve availability.',['Multi-AZ deployment','Health checks','One unmanaged server','Load balancer','No backups'],['Multi-AZ deployment','Health checks','Load balancer'],'HA uses redundancy, health awareness, and traffic distribution.']]},
{id:'net-plus',vendor:'CompTIA',title:'Network+',exam:'N10-009',desc:'Networking fundamentals, routing, switching, wireless, IP addressing, troubleshooting, and operational discipline.',domains:[['Concepts',23],['Implementation',20],['Operations',19],['Security',14],['Troubleshooting',24]],focus:['Subnet until CIDR feels normal.','Troubleshoot from physical layer upward.','Know DNS, DHCP, NAT, VPN, VLANs, and routing basics.'],cards:[['DNS','Maps names to IP addresses.'],['DHCP','Automatically leases IP settings to clients.'],['APIPA','169.254.x.x address when DHCP fails.'],['VLAN','Logical segmentation on a switch.']],questions:[['A client has 169.254.10.22. What failed?','DHCP lease assignment',['DNS lookup','DHCP lease assignment','NAT overload','Default gateway MAC'],'APIPA usually means the client did not receive DHCP settings.'],['Which record maps a hostname to IPv4?','A record',['MX','TXT','A record','CNAME'],'A records map hostnames to IPv4 addresses.'],['Which device separates broadcast domains?','Router or Layer 3 switch',['Hub','Repeater','Router or Layer 3 switch','Patch panel'],'Routing separates broadcast domains.']],labs:[['Subnet speed drill','20 min','exam',['Write /24 through /30 masks.','Calculate usable hosts.','Check broadcast addresses.'],'A subnet table.'],['DNS/DHCP triage','25 min','hands-on',['Run ipconfig/ifconfig.','Check gateway, DNS, and lease.','Explain the failure path.'],'A troubleshooting note.']],pbqs:[['Pick network triage commands','Select the commands that directly help diagnose reachability.',['ping','tracert/traceroute','nslookup','paint','defrag'],['ping','tracert/traceroute','nslookup'],'Reachability, route path, and name resolution are core checks.']]},
{id:'sec-plus',vendor:'CompTIA',title:'Security+',exam:'SY0-701',desc:'Security controls, threats, IAM, cryptography, governance, risk, incident response, and secure operations.',domains:[['Concepts',12],['Threats',22],['Architecture',18],['Operations',28],['GRC',20]],focus:['Learn why controls exist, not just what they are called.','Tie threats to mitigations.','Practice incident response order.'],cards:[['MFA','Requires more than one factor of authentication.'],['Least privilege','Users get only access required for their role.'],['SIEM','Aggregates and analyzes security logs.'],['Hashing','One-way integrity check, not encryption.']],questions:[['What best reduces account takeover risk?','MFA',['Longer monitor cable','MFA','Disabling logs','Open Wi-Fi'],'MFA adds another required factor.'],['Which principle limits user permissions?','Least privilege',['Nonrepudiation','Least privilege','Obfuscation','Load balancing'],'Least privilege limits access to what is required.'],['Which tool centralizes security logs?','SIEM',['DHCP','SIEM','NAT','KVM'],'A SIEM collects and correlates logs.']],labs:[['Incident response runbook','30 min','real-world',['Define preparation.','Add detection, containment, eradication, recovery.','Add lessons learned.'],'A short IR runbook.'],['IAM review','25 min','hands-on',['List user roles.','Find over-permissioned access.','Propose least-privilege change.'],'An access review note.']],pbqs:[['Phishing response steps','Choose safe response actions.',['Report message','Click link to test it','Preserve headers','Reset affected password','Notify security'],['Report message','Preserve headers','Reset affected password','Notify security'],'Do not interact with suspected malicious links.']]},
{id:'aws-cp',vendor:'AWS',title:'AWS Cloud Practitioner',exam:'CLF-C02',desc:'AWS cloud value, core services, billing, global infrastructure, support plans, and shared responsibility.',domains:[['Concepts',24],['Security',30],['Technology',34],['Billing',12]],focus:['Know the AWS global infrastructure.','Separate customer vs AWS responsibility.','Recognize common services and billing tools.'],cards:[['Region','Geographic area containing multiple Availability Zones.'],['EC2','Virtual servers in AWS.'],['S3','Object storage service.'],['IAM','Identity and access management.']],questions:[['Which service stores objects?','S3',['EC2','S3','VPC','CloudTrail'],'S3 is object storage.'],['Who secures data in S3 under shared responsibility?','Customer',['AWS only','Customer','Internet provider','Registrar'],'Customers secure their data and permissions.'],['Which service tracks API activity?','CloudTrail',['CloudTrail','Route 53','EBS','Lambda'],'CloudTrail records AWS API activity.']],labs:[['Shared responsibility map','20 min','exam',['Pick EC2, S3, and Lambda.','List AWS responsibilities.','List customer responsibilities.'],'Responsibility matrix.'],['AWS service sorter','20 min','study',['Sort 20 services by category.','Mark compute, storage, network, security, billing.','Review misses.'],'Service category table.']],pbqs:[['Select AWS billing tools','Choose billing/cost tools.',['Cost Explorer','Budgets','IAM','Trusted Advisor cost checks','S3 Glacier'],['Cost Explorer','Budgets','Trusted Advisor cost checks'],'These tools help visibility, alerts, and optimization.']]},
{id:'aws-saa',vendor:'AWS',title:'Solutions Architect Associate',exam:'SAA-C03',desc:'Design resilient, secure, high-performing, and cost-optimized workloads on AWS.',domains:[['Secure architectures',30],['Resilient architectures',26],['High-performing',24],['Cost optimized',20]],focus:['Design across AZs and managed services.','Choose services by workload pattern.','Explain tradeoffs: cost, performance, durability, operations.'],cards:[['ALB','Layer 7 load balancer for HTTP/HTTPS traffic.'],['RDS Multi-AZ','High availability database deployment.'],['Auto Scaling','Adjusts capacity based on demand.'],['CloudFront','CDN for low-latency content delivery.']],questions:[['What improves relational database availability?','RDS Multi-AZ',['Single AZ RDS','RDS Multi-AZ','Public S3 bucket','One NAT instance'],'Multi-AZ provides standby failover.'],['What reduces global static content latency?','CloudFront',['CloudFront','EFS only','IAM Access Analyzer','CloudTrail'],'CloudFront caches content at edge locations.'],['Which pattern decouples app components?','SQS queue',['Hardcoded IPs','SQS queue','Manual SSH','Larger instance only'],'Queues buffer and decouple producers/consumers.']],labs:[['Three-tier AWS sketch','35 min','exam',['Draw VPC, public/private subnets.','Place ALB, EC2/ASG, RDS.','Add security groups.'],'Architecture diagram notes.'],['Cost optimization review','25 min','study',['Pick one architecture.','Find idle, oversized, or storage lifecycle opportunities.','Rank savings.'],'Cost action list.']],pbqs:[['Resilient web app controls','Select resilient design choices.',['ALB across AZs','Auto Scaling group','RDS Multi-AZ','One EC2 in one AZ','No health checks'],['ALB across AZs','Auto Scaling group','RDS Multi-AZ'],'Resilient apps use redundant compute, traffic distribution, and DB failover.']]},
{id:'linux',vendor:'LPI',title:'Linux Essentials',exam:'010-160',desc:'Linux command line, filesystems, permissions, users, groups, package concepts, and open-source basics.',domains:[['Community',18],['Navigation',22],['Command line',22],['OS basics',20],['Security',18]],focus:['Use the shell daily.','Read permissions quickly.','Practice command output interpretation.'],cards:[['pwd','Print working directory.'],['ls -la','Long listing including hidden files.'],['chmod 754','Owner rwx, group r-x, others r--.'],['grep','Search text patterns.']],questions:[['Which command shows your current directory?','pwd',['pwd','whoami','mkdir','touch'],'pwd prints the working directory.'],['What does chmod 700 allow?','Owner full access only',['Everyone execute','Owner full access only','Group read only','No access'],'7 is rwx; 0 and 0 remove group/other access.'],['Which command searches text in files?','grep',['grep','cd','tar','lsblk'],'grep searches patterns.']],labs:[['Permission table','20 min','exam',['Write chmod 644, 700, 755.','Translate each to rwx.','Explain safest use.'],'Permission table.'],['Shell navigation drill','25 min','hands-on',['Use pwd, ls, cd, mkdir, touch.','Create a small folder tree.','Explain each command.'],'Command log.']],pbqs:[]},
{id:'itil',vendor:'PeopleCert',title:'ITIL Foundation',exam:'ITIL 4',desc:'Service management principles, practices, value streams, incidents, problems, changes, SLAs, and continual improvement.',domains:[['Key concepts',17],['Guiding principles',19],['Dimensions',15],['SVS',29],['Practices',20]],focus:['Know incident vs problem vs change.','Connect practices to customer value.','Think like service delivery, not just tech support.'],cards:[['Incident','Unplanned interruption or reduction in service quality.'],['Problem','Underlying cause of one or more incidents.'],['Change enablement','Maximizes successful service/product changes.'],['SLA','Agreement defining service targets.']],questions:[['What restores service fastest?','Incident management',['Problem management','Incident management','Asset disposal','Budgeting'],'Incident management focuses on restoring service.'],['What investigates root cause?','Problem management',['Problem management','Service desk','Capacity only','Release only'],'Problem management identifies causes and prevents recurrence.'],['What defines service targets?','SLA',['SLA','MAC address','CIDR','AMI'],'SLA defines expected service levels.']],labs:[['Ticket classification drill','20 min','study',['Create 10 sample tickets.','Classify incident/problem/change/request.','Explain why.'],'Ticket classification table.'],['Service improvement note','20 min','real-world',['Pick one service pain.','Define current state.','Suggest measurable improvement.'],'Continual improvement note.']],pbqs:[]}
];
let active=localStorage.activeCert||certs[0].id,tab=localStorage.activeTab||'overview',flash=0,flipped=false,quiz=0,state=load();
function load(){try{return JSON.parse(localStorage.wguStudyState||'{}')}catch{return {}}}function save(){localStorage.wguStudyState=JSON.stringify(state);localStorage.lastSave=new Date().toISOString()}function c(){return certs.find(x=>x.id===active)||certs[0]}function k(name){return active+':'+name}function pct(n,d){return d?Math.round(n/d*100):0}function scores(){return state[k('scores')]||[]}function confidence(){let s=scores().slice(-3);if(!s.length)return '—';return Math.round((s.reduce((a,b)=>a+b,0)/s.length)*.85+Math.min(scores().length,5)*3)+'%'}function completion(x=c()){let labs=(state[k('labs')]||[]).length/(x.labs.length||1)*35,sc=(scores().reduce((a,b)=>a+b,0)/(scores().length||1))*0.45,pb=(state[k('pbqScore')]||0)/(x.pbqs.length||1)*20;return Math.min(100,Math.round(labs+sc+pb))}
function render(){renderNav();renderHead();renderTabs();renderContent()}function renderNav(){let q=(document.getElementById('search').value||'').toLowerCase();nav.innerHTML=certs.filter(x=>(x.title+x.vendor+x.exam+x.desc+x.focus.join(' ')).toLowerCase().includes(q)).map(x=>`<button class="cert ${x.id===active?'active':''}" onclick="active='${x.id}';localStorage.activeCert=active;quiz=0;flash=0;flipped=false;render()"><div><strong>${x.title}</strong><span>${x.vendor} · ${x.exam}</span></div><span class="pill">${completion(x)}%</span></button>`).join('')}function renderHead(){let x=c();kicker.textContent=x.vendor+' · '+x.exam;title.textContent=x.title;desc.textContent=x.desc;progress.textContent=completion(x)+'%';score.textContent=scores().length?scores().at(-1)+'%':'—';confidence.textContent=confidence()}function renderTabs(){let arr=[['overview','Overview'],['practice','Practice'],['flash','Flashcards'],['labs','Labs'],['pbq','PBQ / Sims'],['sources','Sources']];tabs.innerHTML=arr.map(t=>`<button class="tab ${tab===t[0]?'active':''}" onclick="setTab('${t[0]}')">${t[1]}</button>`).join('')}function setTab(t){tab=t;localStorage.activeTab=t;render()}function renderContent(){let x=c();content.innerHTML={overview:overview(x),practice:practice(x),flash:flashcards(x),labs:labs(x),pbq:pbq(x),sources:sourcesPanel(x)}[tab]}
function overview(x){return `<div class="grid two"><div class="glass card"><h3>Domains</h3>${x.domains.map(d=>`<p class="muted"><strong>${d[0]}</strong> <span style="float:right">${d[1]}%</span></p><div class="bar"><div class="fill" style="width:${d[1]}%"></div></div>`).join('')}</div><div class="glass card"><h3>Study focus</h3><ul class="list">${x.focus.map(f=>`<li>${f}</li>`).join('')}</ul></div></div>`}
function practice(x){let q=x.questions[quiz%x.questions.length];return `<div class="glass card"><h3>Practice question ${quiz+1} / ${x.questions.length}</h3><p>${q[0]}</p>${q[2].map(o=>`<button class="option" onclick="answer('${safe(o)}')">${o}</button>`).join('')}<div id="ex"></div></div><div class="actions"><button class="btn" onclick="quiz=(quiz-1+${x.questions.length})%${x.questions.length};render()">Previous</button><button class="btn primary" onclick="quiz=(quiz+1)%${x.questions.length};render()">Next</button><button class="btn" onclick="grade()">Grade answered set</button></div>`}function safe(s){return String(s).replace(/'/g,'&#39;')}function answer(o){o=o.replace(/&#39;/g,"'");let x=c(),q=x.questions[quiz%x.questions.length],ok=o===q[1],a=state[k('answers')]||{};a[quiz]=ok;state[k('answers')]=a;save();document.querySelectorAll('.option').forEach(b=>{if(b.textContent===q[1])b.classList.add('correct');if(b.textContent===o&&!ok)b.classList.add('wrong');b.disabled=true});ex.innerHTML=`<div class="explain"><strong>${ok?'Correct.':'Not quite.'}</strong> ${q[3]}</div>`}function grade(){let x=c(),a=state[k('answers')]||{},score=pct(Object.values(a).filter(Boolean).length,x.questions.length),s=scores();s.push(score);state[k('scores')]=s;state[k('answers')]={};save();alert('Saved score: '+score+'%');render()}
function flashcards(x){let card=x.cards[flash%x.cards.length];return `<div class="glass card flash" onclick="flipped=!flipped;render()"><div>${flipped?`<div class="def">${card[1]}</div>`:`<div class="term">${card[0]}</div><p class="muted">Click to flip</p>`}</div></div><div class="actions"><button class="btn" onclick="flash=(flash-1+${x.cards.length})%${x.cards.length};flipped=false;render()">Previous</button><button class="btn primary" onclick="flash=(flash+1)%${x.cards.length};flipped=false;render()">Next</button></div>`}
function labs(x){let done=state[k('labs')]||[];return `<div class="grid two">${x.labs.map((l,i)=>`<div class="glass card"><h3>${l[0]}</h3><span class="tag">${l[1]} · ${l[2]}</span><ul class="list" style="margin-top:12px">${l[3].map(s=>`<li>${s}</li>`).join('')}</ul><p class="muted"><strong>Deliverable:</strong> ${l[4]}</p><label class="check"><input type="checkbox" ${done.includes(i)?'checked':''} onchange="toggleLab(${i},this.checked)"><span>Mark complete</span></label></div>`).join('')}</div>`}function toggleLab(i,on){let a=state[k('labs')]||[];if(on&&!a.includes(i))a.push(i);if(!on)a=a.filter(x=>x!==i);state[k('labs')]=a;save();render()}
function pbq(x){if(!x.pbqs.length)return '<div class="glass card"><h3>No PBQ module here yet</h3><p class="muted">Use the labs tab for hands-on confidence for this certification.</p></div>';return `<div class="grid">${x.pbqs.map((p,i)=>`<div class="glass card"><h3>${p[0]}</h3><p class="muted">${p[1]}</p>${p[2].map(o=>`<label class="option"><input type="checkbox" data-pbq="${i}" value="${o}"> ${o}</label>`).join('')}<div class="actions"><button class="btn primary" onclick="checkPbq(${i})">Check simulation</button><span id="pbq${i}" class="pill">Not checked</span></div><div id="pbqe${i}" class="explain hide">${p[4]}</div></div>`).join('')}</div><div class="actions"><button class="btn" onclick="savePbq()">Save PBQ score</button></div>`}function checkPbq(i){let p=c().pbqs[i],picked=[...document.querySelectorAll(`input[data-pbq="${i}"]:checked`)].map(x=>x.value).sort(),ans=[...p[3]].sort(),ok=picked.length===ans.length&&picked.every((v,j)=>v===ans[j]);document.getElementById('pbq'+i).textContent=ok?'Correct':'Review';document.getElementById('pbq'+i).style.color=ok?'var(--good)':'var(--warn)';document.getElementById('pbqe'+i).classList.remove('hide');let checks=state[k('pbqChecks')]||{};checks[i]=ok;state[k('pbqChecks')]=checks;save()}function savePbq(){let checks=state[k('pbqChecks')]||{},score=Object.values(checks).filter(Boolean).length;state[k('pbqScore')]=score;save();alert('Saved PBQ score: '+score+'/'+c().pbqs.length);render()}
function sourcesPanel(){return `<div class="grid two"><div class="glass card"><h3>Disclaimers</h3><p class="muted">Original educational study tool. Not affiliated with WGU, CompTIA, AWS, LPI, or PeopleCert. No exam dumps, real exam questions, or protected exam content. Verify against official objectives before serious exam prep.</p><button class="btn primary" onclick="exportProgress()">Export progress as JSON</button></div><div class="glass card"><h3>Known gaps</h3><ul class="list"><li>Official objective mapping still needs to be added.</li><li>Question volume is prototype-level.</li><li>Spaced repetition is not implemented yet.</li><li>Mobile polish should be tested on real devices.</li></ul></div></div>`}function exportProgress(){let blob=new Blob([JSON.stringify({active,exported:new Date().toISOString(),state},null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='wgu-study-progress.json';a.click();URL.revokeObjectURL(url)}function resetProgress(){if(confirm('Clear saved progress in this browser?')){state={};save();render()}}
search.addEventListener('input',renderNav);render();
</script>
